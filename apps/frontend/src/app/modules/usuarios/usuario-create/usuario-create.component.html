<mat-card>
  <mat-card-header>
    <mat-card-title>Crear Usuario</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="text" formControlName="email" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>PasswordHash</mat-label>
        <input matInput type="text" formControlName="passwordHash" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Nombre</mat-label>
        <input matInput type="text" formControlName="nombre" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Apellido</mat-label>
        <input matInput type="text" formControlName="apellido" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>RolId</mat-label>
        <input matInput type="number" formControlName="rolId" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Activo</mat-label>
        <input matInput type="checkbox" formControlName="activo" required>
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button (click)="cancel()" [disabled]="loading">
      Cancelar
    </button>
    <button mat-raised-button color="primary" (click)="save()" [disabled]="loading || !form.valid">
      {{ loading ? 'Guardando...' : 'Guardar' }}
    </button>
  </mat-card-actions>
</mat-card>
