<mat-card>
  <mat-card-header>
    <mat-card-title>Editar SolicitudHistorial</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>SolicitudId</mat-label>
        <input matInput type="text" formControlName="solicitudId" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>EstadoSolicitudId</mat-label>
        <input matInput type="number" formControlName="estadoSolicitudId" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>UsuarioId</mat-label>
        <input matInput type="text" formControlName="usuarioId" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Fecha</mat-label>
        <input matInput type="date" formControlName="fecha" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Comentario</mat-label>
        <input matInput type="text" formControlName="comentario" required>
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button (click)="cancel()" [disabled]="loading">
      Cancelar
    </button>
    <button mat-raised-button color="primary" (click)="save()" [disabled]="loading || !form.valid">
      {{ loading ? 'Guardando...' : 'Guardar' }}
    </button>
  </mat-card-actions>
</mat-card>
