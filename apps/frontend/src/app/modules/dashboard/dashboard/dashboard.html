<div class="dashboard">
  <h1>Dashboard ANFUTRANS</h1>

  <div class="stats-grid">

    <div class="stat-card">
      <h3>Socios Activos</h3>
      <p class="stat-number">{{ totalSocios }}</p>
    </div>

    <div class="stat-card">
      <h3>Trámites Pendientes</h3>
      <p class="stat-number">{{ tramitesPendientes }}</p>
    </div>

    <div class="stat-card">
      <h3>Beneficios Activos</h3>
      <p class="stat-number">{{ beneficiosActivos }}</p>
    </div>

    <div class="stat-card">
      <h3>Solicitudes del Mes</h3>
      <p class="stat-number">{{ solicitudesMes }}</p>
    </div>

  </div>

  <div class="recent-activity">
    <h2>Actividad Reciente</h2>
    <p>Últimas actividades del sistema...</p>
  </div>

</div>
