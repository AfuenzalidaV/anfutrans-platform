<mat-card>
  <mat-card-header>
    <mat-card-title>Solicitud</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="loading" class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>

    <app-data-table
      *ngIf="!loading"
      [data]="data"
      [columns]="columns">
    </app-data-table>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-raised-button color="primary" routerLink="/solicitudes/nuevo">
      <mat-icon>add</mat-icon>
      Nuevo
    </button>
  </mat-card-actions>
</mat-card>
