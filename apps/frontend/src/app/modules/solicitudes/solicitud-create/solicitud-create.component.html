<mat-card>
  <mat-card-header>
    <mat-card-title>Crear Solicitud</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>SocioId</mat-label>
        <input matInput type="text" formControlName="socioId" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>TipoSolicitudId</mat-label>
        <input matInput type="number" formControlName="tipoSolicitudId" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>EstadoSolicitudId</mat-label>
        <input matInput type="number" formControlName="estadoSolicitudId" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>FechaSolicitud</mat-label>
        <input matInput type="date" formControlName="fechaSolicitud" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Observaciones</mat-label>
        <input matInput type="text" formControlName="observaciones" required>
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button (click)="cancel()" [disabled]="loading">
      Cancelar
    </button>
    <button mat-raised-button color="primary" (click)="save()" [disabled]="loading || !form.valid">
      {{ loading ? 'Guardando...' : 'Guardar' }}
    </button>
  </mat-card-actions>
</mat-card>
