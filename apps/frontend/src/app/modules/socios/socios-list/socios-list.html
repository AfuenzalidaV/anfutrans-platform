<mat-card>
  <mat-card-header>
    <mat-card-title>Gestión de Socios</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <mat-form-field class="search-field">
      <mat-label>Buscar socio</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Buscar por nombre, RUT, etc.">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort>

        <ng-container matColumnDef="rut">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>RUT</th>
          <td mat-cell *matCellDef="let socio">{{socio.rut}}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
          <td mat-cell *matCellDef="let socio">{{socio.nombre}}</td>
        </ng-container>

        <ng-container matColumnDef="apellido">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
          <td mat-cell *matCellDef="let socio">{{socio.apellido}}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
          <td mat-cell *matCellDef="let socio">{{socio.email || '-'}}</td>
        </ng-container>

        <ng-container matColumnDef="telefono">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Teléfono</th>
          <td mat-cell *matCellDef="let socio">{{socio.telefono || '-'}}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="5">No se encontraron socios</td>
        </tr>

      </table>
    </div>

    <mat-paginator
      [pageSize]="10"
      [pageSizeOptions]="[5, 10, 20, 50]"
      showFirstLastButtons>
    </mat-paginator>

  </mat-card-content>
</mat-card>
