<mat-card>
  <mat-card-header>
    <mat-card-title>Formulario de Socio</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="guardar()">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>RUT</mat-label>
        <input matInput formControlName="rut" placeholder="12345678-9">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Apellido</mat-label>
        <input matInput formControlName="apellido">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Teléfono</mat-label>
        <input matInput formControlName="telefono">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Comuna ID</mat-label>
        <input matInput formControlName="comunaId" type="number">
      </mat-form-field>

      <div class="button-row">
        <button mat-raised-button color="primary" type="submit" [disabled]="!form.valid || loading">
          Guardar
        </button>
        <button mat-button type="button" routerLink="/socios">
          Cancelar
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
