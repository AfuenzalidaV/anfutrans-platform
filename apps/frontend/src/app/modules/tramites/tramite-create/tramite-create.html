<mat-card>
  <mat-card-header>
    <mat-card-title>Crear Nuevo Trámite</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>ID Socio</mat-label>
        <input matInput formControlName="socioId">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Tipo Solicitud ID</mat-label>
        <input matInput type="number" formControlName="tipoSolicitudId">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Observaciones</mat-label>
        <textarea matInput formControlName="observaciones" rows="4"></textarea>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Estado Solicitud ID</mat-label>
        <input matInput type="number" formControlName="estadoSolicitudId">
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button (click)="cancelar()">Cancelar</button>
    <button mat-raised-button color="primary" (click)="guardar()">Guardar</button>
  </mat-card-actions>
</mat-card>
