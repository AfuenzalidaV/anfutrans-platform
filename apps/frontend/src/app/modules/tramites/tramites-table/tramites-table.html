<mat-card>
  <mat-card-header>
    <mat-card-title>Trámites</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <app-data-table
      [data]="tramites"
      [columns]="columns">
    </app-data-table>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-raised-button color="primary" routerLink="/tramites/nuevo">
      <mat-icon>add</mat-icon>
      Nuevo Trámite
    </button>
  </mat-card-actions>
</mat-card>
