<mat-card>
  <mat-card-header>
    <mat-card-title>Editar TipoSolicitud</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Codigo</mat-label>
        <input matInput type="text" formControlName="codigo" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Nombre</mat-label>
        <input matInput type="text" formControlName="nombre" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Descripcion</mat-label>
        <input matInput type="text" formControlName="descripcion" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>RequiereAprobacion</mat-label>
        <input matInput type="checkbox" formControlName="requiereAprobacion" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>PermiteBorrador</mat-label>
        <input matInput type="checkbox" formControlName="permiteBorrador" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Activo</mat-label>
        <input matInput type="checkbox" formControlName="activo" required>
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button (click)="cancel()" [disabled]="loading">
      Cancelar
    </button>
    <button mat-raised-button color="primary" (click)="save()" [disabled]="loading || !form.valid">
      {{ loading ? 'Guardando...' : 'Guardar' }}
    </button>
  </mat-card-actions>
</mat-card>
