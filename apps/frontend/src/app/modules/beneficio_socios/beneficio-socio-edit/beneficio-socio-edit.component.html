<mat-card>
  <mat-card-header>
    <mat-card-title>Editar BeneficioSocio</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>SocioId</mat-label>
        <input matInput type="text" formControlName="socioId" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>BeneficioId</mat-label>
        <input matInput type="text" formControlName="beneficioId" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>FechaOtorgamiento</mat-label>
        <input matInput type="date" formControlName="fechaOtorgamiento" required>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Activo</mat-label>
        <input matInput type="checkbox" formControlName="activo" required>
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button (click)="cancel()" [disabled]="loading">
      Cancelar
    </button>
    <button mat-raised-button color="primary" (click)="save()" [disabled]="loading || !form.valid">
      {{ loading ? 'Guardando...' : 'Guardar' }}
    </button>
  </mat-card-actions>
</mat-card>
