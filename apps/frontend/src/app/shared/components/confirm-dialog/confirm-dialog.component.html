<div class="confirm-dialog" [class]="'dialog-' + data.type">
  <!-- Header -->
  <div class="dialog-header">
    <mat-icon *ngIf="data.type === 'info'" class="dialog-icon">info</mat-icon>
    <mat-icon *ngIf="data.type === 'warning'" class="dialog-icon">warning</mat-icon>
    <mat-icon *ngIf="data.type === 'danger'" class="dialog-icon">error</mat-icon>
    <h2 mat-dialog-title>{{ data.title }}</h2>
  </div>

  <!-- Content -->
  <mat-dialog-content>
    <p>{{ data.message }}</p>
  </mat-dialog-content>

  <!-- Actions -->
  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">
      {{ data.cancelText }}
    </button>
    <button
      mat-raised-button
      [color]="data.type === 'danger' ? 'warn' : 'primary'"
      (click)="onConfirm()"
      cdkFocusInitial
    >
      {{ data.confirmText }}
    </button>
  </mat-dialog-actions>
</div>
