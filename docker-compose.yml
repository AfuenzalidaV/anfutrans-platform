version: "3.8"

services:
  # ================================
  # PostgreSQL Database
  # ================================
  db:
    image: postgres:14-alpine
    container_name: anfutrans-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-anfutrans_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-anfutrans_password}
      POSTGRES_DB: ${DB_NAME:-anfutrans_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - anfutrans-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-anfutrans_user} -d ${DB_NAME:-anfutrans_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # Backend (NestJS)
  # ================================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: runner
    container_name: anfutrans-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: postgresql://${DB_USER:-anfutrans_user}:${DB_PASSWORD:-anfutrans_password}@db:5432/${DB_NAME:-anfutrans_db}?schema=core
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - anfutrans-network
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: sh -c "npx prisma migrate deploy && node dist/main"

  # ================================
  # Frontend (Angular + Nginx)
  # ================================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: runner
    container_name: anfutrans-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: ${API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - anfutrans-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ================================
  # Adminer (Opcional - Solo Dev)
  # ================================
  adminer:
    image: adminer:latest
    container_name: anfutrans-adminer
    restart: unless-stopped
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - anfutrans-network
    profiles:
      - dev

# ================================
# Networks
# ================================
networks:
  anfutrans-network:
    driver: bridge

# ================================
# Volumes
# ================================
volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
